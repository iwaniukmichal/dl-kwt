frontend:
  kind: log_mel
  sample_rate: 16000
  n_mels: 40
  window_ms: 30.0
  hop_ms: 10.0
  expected_frames: 98

model:
  name: bcresnet
  variant: bcresnet-1
  base_channels: 8
  stage_blocks: [2, 2, 4, 4]
  stride_stages: [1, 2]
  spec_groups: 5
  dropout: 0.1

train:
  mode: epochs
  max_epochs: 100
  batch_size: 512
  grad_accumulation_steps: 1
  #optimizer:
  #  name: sgd
  #  lr: 0.1
  #  momentum: 0.9
  #  weight_decay: 0.001
  optimizer:
    name: adamw
    lr: 0.01
    weight_decay: 0.001
    beta1: 0.9
    beta2: 0.999
  scheduler:
    name: cosine
    warmup_epochs: 5
    min_lr_ratio: 0.1
